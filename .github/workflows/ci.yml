name: ci

# The required status check is the job name `ci` (see setup-governance.sh).
# This job runs the SAME gate the pre-push hook and you run — `scripts/check.sh`
# — in its no-toolchain `--ci` mode, so local and CI can't drift.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Provision the gate's tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          npm i -g ajv-cli@5

      - name: Gate (scripts/check.sh --ci)
        run: scripts/check.sh --ci
