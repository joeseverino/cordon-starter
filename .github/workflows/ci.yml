# The entire CI surface of this repo. All the plumbing — checkout, tool setup,
# pinned action SHAs, running the gate, surfacing the report — lives once in
# cordon's reusable gate, which runs this repo's own `scripts/check.sh --ci`
# (the same gate you run locally and pre-push). To change CI for every repo,
# edit the gate in cordon; to change this repo's checks, edit scripts/check.sh
# and cordon.checks.json. Required status check: `cordon / gate`.
# See https://github.com/joeseverino/cordon/blob/main/docs/REUSABLE-GATE.md
name: cordon

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cordon:
    uses: joeseverino/cordon/.github/workflows/cordon-gate.yml@main
