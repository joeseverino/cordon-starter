name: ci

# The required status check is the job name `ci` (see setup-governance.sh).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: shellcheck bin + scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck -x bin/* scripts/*.sh .githooks/*

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cordon contract conformance
        # Validate every committed contract against the VENDORED, frozen v4
        # schema (schema/cordon-v4.json) — no network fetch, so a copied starter
        # never depends on a live URL or a WAF rule. Drift between a tool's
        # --describe and its golden is caught locally by scripts/check.sh.
        run: |
          npm i -g ajv-cli@5
          shopt -s nullglob
          contracts=(contract/*.json)
          if [ ${#contracts[@]} -eq 0 ]; then echo "no contracts to validate"; exit 0; fi
          for f in "${contracts[@]}"; do
            echo "validating $f"
            ajv validate --spec=draft2020 -s schema/cordon-v4.json -d "$f"
          done
